nameOverride: ""
fullnameOverride: ""

global:
  environment: production
  domain: game.example.com

backend:
  replicaCount: 3

  image:
    repository: jfrogtrail1.jfrog.io/docker-local-docker-local/backend
    tag: 89295a6
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  env:
    NODE_ENV: production
    PORT: 3000
    LOG_LEVEL: info

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - game-backend
            topologyKey: kubernetes.io/hostname

frontend:
  replicaCount: 2

  image:
    repository: jfrogtrail1.jfrog.io/docker-local-docker-local/frontend
    tag: 89295a6
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3001
    targetPort: 3001

  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  env:
    NODE_ENV: production

ingress:
  enabled: true
  className: nginx

  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"

  hosts:
    - host: game.example.com
      paths:
        - path: /
          pathType: Prefix

  tls:
    - secretName: game-tls
      hosts:
        - game.example.com

persistence:
  enabled: false
  storageClass: standard
  size: 10Gi

metrics:
  enabled: true

  serviceMonitor:
    enabled: true
    interval: 30s

autoscaling:

  backend:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  frontend:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

podSecurityPolicy:
  enabled: false

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

nodeSelector: {}

tolerations: []

affinity: {}

resources: {}