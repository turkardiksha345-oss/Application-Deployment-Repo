apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: game-app
  namespace: argocd
spec:
  description: Game Application Project
  sourceRepos:
    - 'https://github.com/turkardiksha345-oss/Application-Deployment.git'
    - 'https://jfrogtrial1.jfrog.io/*'
  destinations:
    - namespace: 'game-app'
      server: https://kubernetes.default.svc
    - namespace: 'kube-system'
      server: https://kubernetes.default.svc
  clusterResourceBlacklist:
    - group: '*'
      kind: ResourceQuota
    - group: '*'
      kind: LimitRange
  clusterResourceWhitelist:
    - group: '*'
      kind: Namespace
  namespaceResourceBlacklist:
    - group: ''
      kind: ResourceQuota
    - group: ''
      kind: LimitRange
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
